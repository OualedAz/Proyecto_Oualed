<div class="auth-page-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <h2>¡Te damos la bienvenida!</h2>
      <p>Inicia sesión en tu cuenta de gesCasesRurals</p>
    </div>
    
    <!-- Error alert banner -->
    <div class="auth-error-banner" id="login-error-banner">
      Ocurrió un error. Comprueba tus datos.
    </div>
    
    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="login-email">Correo Electrónico</label>
        <input type="email" class="form-control" id="login-email" placeholder="correo@ejemplo.com" required>
      </div>
      
      <div class="form-group">
        <label class="form-label" for="login-password">Contraseña</label>
        <input type="password" class="form-control" id="login-password" placeholder="Tu contraseña" required>
      </div>
      
      <button type="submit" class="btn btn-primary auth-submit-btn" id="login-submit-btn">
        <i class="fa-solid fa-right-to-bracket"></i> Iniciar Sesión
      </button>
    </form>
    
    <div class="auth-footer">
      ¿No tienes una cuenta? <a href="#/registro">Regístrate gratis</a>
    </div>
  </div>
</div>
